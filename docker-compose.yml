version: "3.8"

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cold-storage-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/cold_storage.db:/app/backend/cold_storage.db
      - ./ml/output:/app/ml/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: cold-storage-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
